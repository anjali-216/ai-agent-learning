<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Libertum AI | Intelligent Document Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --glass: rgba(30, 41, 59, 0.7);
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: var(--bg);
            background-image: radial-gradient(circle at top right, rgba(99, 102, 241, 0.15), transparent),
                radial-gradient(circle at bottom left, rgba(79, 70, 229, 0.1), transparent);
            color: var(--text);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .container {
            width: 900px;
            height: 85vh;
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        header {
            padding: 24px 32px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        header h1 {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: var(--text-dim);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #22c55e;
            border-radius: 50%;
            box-shadow: 0 0 10px #22c55e;
        }

        #chat-window {
            flex: 1;
            padding: 32px;
            overflow-y: auto;
            scroll-behavior: smooth;
        }

        #chat-window::-webkit-scrollbar {
            width: 6px;
        }

        #chat-window::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 10px;
        }

        .message {
            margin-bottom: 24px;
            max-width: 80%;
            animation: fadeIn 0.3s ease-out forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            margin-left: auto;
        }

        .bubble {
            padding: 16px 20px;
            border-radius: 18px;
            font-size: 16px;
            line-height: 1.6;
        }

        .user .bubble {
            background: var(--primary);
            border-bottom-right-radius: 4px;
        }

        .bot .bubble {
            background: var(--card);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }

        .sources {
            margin-top: 12px;
            font-size: 12px;
            color: var(--text-dim);
        }

        .source-tag {
            display: inline-block;
            padding: 2px 8px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 6px;
            margin-right: 6px;
        }

        footer {
            padding: 24px 32px;
            border-top: 1px solid var(--border);
        }

        .input-group {
            display: flex;
            gap: 12px;
            background: rgba(255, 255, 255, 0.05);
            padding: 8px;
            border-radius: 16px;
            border: 1px solid var(--border);
            transition: all 0.3s;
        }

        .input-group:focus-within {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.08);
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text);
            padding: 12px 16px;
            font-size: 16px;
            outline: none;
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0 24px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(0);
        }

        .loader {
            display: inline-flex;
            gap: 4px;
            padding: 10px;
        }

        .loader span {
            width: 6px;
            height: 6px;
            background: var(--text-dim);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .loader span:nth-child(1) {
            animation-delay: -0.32s;
        }

        .loader span:nth-child(2) {
            animation-delay: -0.16s;
        }

        @keyframes bounce {

            0%,
            80%,
            100% {
                transform: scale(0);
            }

            40% {
                transform: scale(1.0);
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <header>
            <div>
                <h1>Libertum AI</h1>
                <p id="sub-header" style="font-size: 12px; color: var(--text-dim);">Trained on whitepapers and docs</p>
            </div>
            <div class="status">
                <div class="status-dot"></div>
                <span>Server Online</span>
            </div>
        </header>

        <div id="chat-window">
            <div class="message bot">
                <div class="bubble">
                    Hello! I am your Libertum assistant. How can I help you today?
                </div>
            </div>
        </div>

        <footer>
            <form id="chat-form">
                <div class="input-group">
                    <input type="text" id="user-input"
                        placeholder="Ask about Libertum, Bonding Curves, or anything in your docs..."
                        autocomplete="off">
                    <button type="submit">Send</button>
                </div>
            </form>
        </footer>
    </div>

    <script>
        const chatWindow = document.getElementById('chat-window');
        const chatForm = document.getElementById('chat-form');
        const userInput = document.getElementById('user-input');

        // PERSISTENT SESSION ID: Check if we already have one, otherwise create it
        let sessionId = localStorage.getItem('libertum_session_id');
        if (!sessionId) {
            sessionId = 'session_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('libertum_session_id', sessionId);
        }

        function addMessage(text, isUser = false, sources = []) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${isUser ? 'user' : 'bot'}`;

            let sourceHtml = '';
            if (sources && sources.length > 0) {
                const uniqueSources = [...new Set(sources.map(s => s.source))];
                sourceHtml = `<div class="sources">Sources: ${uniqueSources.map(s => `<span class="source-tag">${s}</span>`).join('')}</div>`;
            }

            msgDiv.innerHTML = `
                <div class="bubble">${text}</div>
                ${sourceHtml}
            `;
            chatWindow.appendChild(msgDiv);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function addLoader() {
            const loaderDiv = document.createElement('div');
            loaderDiv.className = 'message bot loading';
            loaderDiv.innerHTML = '<div class="bubble"><div class="loader"><span></span><span></span><span></span></div></div>';
            chatWindow.appendChild(loaderDiv);
            chatWindow.scrollTop = chatWindow.scrollHeight;
            return loaderDiv;
        }

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const message = userInput.value.trim();
            if (!message) return;

            addMessage(message, true);
            userInput.value = '';

            // Create a "Thinking..." bubble
            const thinkingDiv = addMessage("Initializing agents...", false);
            const contentDiv = thinkingDiv.querySelector('.message-content');
            const statusDiv = document.createElement('div');
            statusDiv.className = 'status-indicator';
            statusDiv.style.fontSize = '0.8rem';
            statusDiv.style.opacity = '0.7';
            thinkingDiv.appendChild(statusDiv);

            try {
                const response = await fetch('http://localhost:3000/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message, sessionId })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const data = JSON.parse(line.substring(6));

                            if (data.type === 'status') {
                                statusDiv.innerText = `● ${data.message}`;
                            } else if (data.type === 'final') {
                                // Final Answer
                                contentDiv.innerText = ''; // Clear the "init" message
                                addMarkdownContent(contentDiv, data.answer);
                                statusDiv.remove();
                                thinkingDiv.classList.add('loaded');
                            } else if (data.type === 'error') {
                                contentDiv.innerText = "Error: " + data.message;
                            }
                        }
                    }
                }

            } catch (error) {
                contentDiv.innerText = "Error: Could not connect to server.";
            }
        });

        // Helper to handle markdown-like characters
        function addMarkdownContent(container, text) {
            container.innerText = text;
            container.style.whiteSpace = 'pre-wrap';
        }
    </script>
</body>

</html>
